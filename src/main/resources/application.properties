spring.application.name=langchain4jdemo

langchain4j.open-ai.chat-model.api-key=${OPENAI_API_KEY}
langchain4j.open-ai.chat-model.model-name=gpt-4o-mini
langchain4j.open-ai.chat-model.temperature=0.7
langchain4j.open-ai.chat-model.max-tokens=50
# For langchain4j core: specify the chat model name the starter expects
langchain4j.chatModel=gpt-4o-mini

# Prevent Langchain4j auto-configuration from registering `assistant` until
# chatModel/streamingChatModel are properly configured.
spring.autoconfigure.exclude=dev.langchain4j.service.spring.AiServicesAutoConfig
